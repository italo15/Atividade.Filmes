<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Filmes</title>
    <link rel="stylesheet" href="styles.CSS\Filmes.Css">
</head>

<body>
    <!-- O <section> foi criado para o agrupamento dos "button" e "label". -->
    <section class="barraPesquisaBotaoSaida" style="width: 600.233px; height: 75.05px;">
        <!-- foi criado um campo de pesquisa para o usuario procurar o filme que deseja.-->
        <div class="conteudo">
            <form class="campoPesquisa">
                <label for="Pesquisa"></label>
                <input type="text" id="Pesquisas" placeholder="Ex: La Chinoise..."
                    style="background-color: rgb(59, 59, 59);">
                <button id="lupaBusca" style="background-color: rgb(59, 59, 59);">
                    <img src="Assets\zoom-svgrepo-com.svg" id="imag">
                </button>
                <!-- foi criado um botao de sair de sua pagina, talvez mude para sair da pequisa, mas deus sabe-->
                <button id="botaoSair" type="button" onclick="window.location.href='login.html';">
                    <img src="Assets/emergency-exit-svgrepo-com.svg" id="imag">
                </button>
            </form>

        </div>

        <!-- O "Carroussel" foi criado para mostrar os filmes mais recentes, e ao clicar na imagem do filme, o usuario é redirecionado para a pagina do filme. -->
        <div class="CarrousselFilmes">
            <div class="CarrousselItens">
                <button><img src="https://m.media-amazon.com/images/M/MV5BOWFkMmU0NWYtY2I3OC00ZGI0LWE4M2EtZGUzYzRkNGI2MzM2XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" onclick="window.location.href='https://www.adorocinema.com/filmes/filme-132150/'" alt="Slide 1"></button>
                <button><img src="https://m.media-amazon.com/images/M/MV5BOWFkMmU0NWYtY2I3OC00ZGI0LWE4M2EtZGUzYzRkNGI2MzM2XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" onclick="window.location.href='https://www.adorocinema.com/filmes/filme-132151/'" alt="Slide 2"></button>
                <button><img src="https://m.media-amazon.com/images/M/MV5BOWFkMmU0NWYtY2I3OC00ZGI0LWE4M2EtZGUzYzRkNGI2MzM2XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" onclick="window.location.href='https://www.adorocinema.com/filmes/filme-132152/'" alt="Slide 3"></button>
            </div>
        </div>
    </section>



    <script src="JS\script.js" defer></script>
</body>

</html>
