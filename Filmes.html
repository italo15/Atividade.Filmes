<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Filmes</title>
    <link rel="stylesheet" href="styles.CSS\Filmes.Css">
</head>
<body>
    <div class="conteudo">

        <div class="campoPesquisa">
            <label for="Pesquisa"></label>
            <input type="text" id="Pesquisa" placeholder="Ex: La Chinoise..." >
            <button id="lupaBusca" ><img src="Assets\zoom-svgrepo-com.svg" id="imag" ></button>
        </div>

        <card id="cardFilmes">
            <section class="grupoPosterTitulo">
                <article class="grupoCampos">
                    <img id="poster" alt="Poster" style="max-width: 200px; height: auto; display: none;">
                </article>
                
                <article class="grupoCampos">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" readonly>
                </article>
            </section>

            <section class="grupoDiretorAnoDuracao">
                <article class="grupoCampos">
                    <label for="diretor">Direção:</label>
                    <input type="text" id="diretor" readonly>
                </article>

                <article class="grupoCampos">
                    <label for="ano">Lançamento:</label>
                    <input type="text" id="ano" readonly>
                </article>

                <article class="grupoCampos">
                    <label for="duracao">Duração:</label>
                    <input type="text" id="duracao" readonly>
                </article>
            </section>

            <article class="grupoCampos">
                <label for="atores">Atores:</label>
                <input type="text" id="atores" readonly>
            </article>

            <article class="grupoCampos">
                <label for="genero">Gênero:</label>
                <input type="text" id="genero" readonly>
            </article>

            <article class="grupoCampos">
                <label for="sinopse">Sinopse:</label>
                <input type="text" id="sinopse" readonly>
            </article>
        </card>
    </div>

    <script src="JS\script.js" defer></script>
</body>
</html>
